<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>OlmoEarth Change Overlay</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
            integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
            crossorigin=""
        />
        <link rel="stylesheet" href="./styles.css" />
    </head>
    <body>
        <div class="shell">
            <aside class="panel">
                <div class="eyebrow">OlmoEarth Change Desk</div>
                <h1 id="title">Loading analysis...</h1>
                <p id="subtitle" class="subtitle">
                    Reading summary and overlay layers.
                </p>

                <section class="controls">
                    <label for="basemap">Basemap</label>
                    <select id="basemap"></select>

                    <label for="unit">Analysis Units</label>
                    <select id="unit"></select>

                    <label for="metric">Metric</label>
                    <select id="metric"></select>

                    <label for="period">Lookback Period</label>
                    <input
                        id="period"
                        type="range"
                        min="0"
                        max="0"
                        value="0"
                        step="1"
                    />
                    <div id="periodLabel" class="period-label"></div>

                    <label for="opacity">Overlay Opacity</label>
                    <input
                        id="opacity"
                        type="range"
                        min="0.15"
                        max="0.95"
                        value="0.7"
                        step="0.05"
                    />
                </section>

                <section class="legend-card">
                    <div class="legend-title">Legend</div>
                    <div id="legendScale" class="legend-scale"></div>
                    <div class="legend-range">
                        <span id="legendMin">0</span>
                        <span id="legendMax">0</span>
                    </div>
                </section>

                <section class="summary-grid" id="summaryGrid"></section>

                <section>
                    <div class="legend-title">Top Hotspots</div>
                    <div id="hotspots" class="hotspots"></div>
                </section>
            </aside>

            <main class="map-wrap">
                <div id="map"></div>
            </main>
        </div>

        <script
            src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""
        ></script>
        <script src="./app.js"></script>
    </body>
</html>
