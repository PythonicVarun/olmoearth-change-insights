<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OlmoEarth Change Insights - All Outputs</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%2210 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌍</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
        rel="stylesheet"
    />
    <link rel="stylesheet" href="../landing/styles.css" />
    <style>
        .outputs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 28px;
        }

        .output-card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
        }

        .output-card:hover {
            border-color: var(--accent);
            box-shadow: 0 12px 32px rgba(19, 212, 255, 0.15);
            transform: translateY(-4px);
        }

        .output-card-badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .output-card-title {
            font-family: "Space Grotesk", sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0 0 10px 0;
            color: var(--ink);
        }

        .output-card-description {
            font-size: 0.85rem;
            color: var(--muted);
            line-height: 1.5;
            flex-grow: 1;
            margin-bottom: 12px;
        }

        .output-card-link {
            display: inline-flex;
            align-items: center;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent-deep);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .output-card-link:hover {
            color: var(--accent);
        }

        .output-card-link::after {
            content: " →";
            margin-left: 4px;
        }

        .search-container {
            margin-top: 24px;
            margin-bottom: 24px;
        }

        .search-input {
            width: 100%;
            max-width: 500px;
            padding: 12px 16px;
            font-size: 0.95rem;
            font-family: "IBM Plex Sans", sans-serif;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 12px;
            color: var(--text);
            transition: all 0.2s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(19, 212, 255, 0.1);
        }

        .search-input::placeholder {
            color: var(--muted);
        }

        .search-results-info {
            font-size: 0.9rem;
            color: var(--muted);
            margin-top: 12px;
            display: none;
        }

        .search-results-info.visible {
            display: block;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px 20px;
            color: var(--muted);
        }

        .no-results-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 20px;
        }

        @media (max-width: 1200px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 640px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <header class="hero" style="grid-template-columns: 1fr;">
            <div class="hero-copy">
                <div class="eyebrow">OlmoEarth Change Desk</div>
                <h1>All Outputs</h1>
                <p class="hero-subtitle">
                    Browse comprehensive environmental change analysis across all studied regions. Each output features detailed satellite imagery comparisons and environmental metrics.
                </p>
                <div style="margin-top: 16px;">
                    <a href="../" class="action-link secondary" style="display: inline-block;">← Back to Home</a>
                </div>
            </div>
        </header>

        <main>
            <div class="search-container">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="Search by city, region, or tag... (e.g., 'Mumbai', 'coastal', 'wards')"
                />
                <div class="search-results-info" id="searchInfo"></div>
            </div>

            <div class="grid-container" id="outputsContainer">
                <!-- Outputs will be populated here -->
            </div>
        </main>
    </div>

    <script>
        const OUTPUTS = [
            {
                id: "bengaluru",
                title: "Bengaluru",
                region: "Karnataka",
                description: "Analysis of urban growth and environmental changes in Bengaluru metropolitan area.",
                tags: ["Urban", "10y"]
            },
            {
                id: "chengalputtu",
                title: "Chengalputtu",
                region: "Tamil Nadu",
                description: "10-year change analysis of Chengalputtu district with ward-level details.",
                tags: ["District", "10y", "Wards"]
            },
            {
                id: "chennai",
                title: "Chennai",
                region: "Tamil Nadu",
                description: "Environmental change tracking across Chennai metropolitan region.",
                tags: ["Urban", "10y"]
            },
            {
                id: "delhi",
                title: "New Delhi",
                region: "Delhi",
                description: "Environmental changes in the capital region with high resolution data.",
                tags: ["Urban", "10y", "Wards"]
            },
            {
                id: "gautam_buddha_nagar",
                title: "Gautam Buddha Nagar",
                region: "Uttar Pradesh",
                description: "10-year change monitoring of this rapidly developing district.",
                tags: ["District", "10y"]
            },
            {
                id: "gurgaon",
                title: "Gurgaon",
                region: "Haryana",
                description: "5-year environmental analysis with ward-level breakdown.",
                tags: ["District", "5y", "Wards"]
            },
            {
                id: "jaipur",
                title: "Jaipur",
                region: "Rajasthan",
                description: "Long-term urban development and environmental impact analysis.",
                tags: ["Urban", "10y"]
            },
            {
                id: "kanpur_nagar",
                title: "Kanpur Nagar",
                region: "Uttar Pradesh",
                description: "Environmental monitoring across the Kanpur Nagar district.",
                tags: ["District", "10y", "Wards"]
            },
            {
                id: "kolkata",
                title: "Kolkata",
                region: "West Bengal",
                description: "Urban environmental change analysis in Eastern India's major city.",
                tags: ["Urban", "10y"]
            },
            {
                id: "mahe-1y",
                title: "Mahe (1-Year Pilot)",
                region: "Puducherry",
                description: "Quick 1-year pilot study of coastal Mahe region.",
                tags: ["Coastal", "1y", "Pilot"]
            },
            {
                id: "mumbai",
                title: "Mumbai",
                region: "Maharashtra",
                description: "Comprehensive analysis of India's largest metropolitan area.",
                tags: ["Urban", "10y", "Wards"]
            },
            {
                id: "mumbai-district",
                title: "Mumbai District",
                region: "Maharashtra",
                description: "10-year environmental analysis of Mumbai district.",
                tags: ["District", "10y"]
            },
            {
                id: "new_delhi-district",
                title: "New Delhi District",
                region: "Delhi",
                description: "10-year environmental analysis of New Delhi district.",
                tags: ["District", "10y"]
            },
            {
                id: "pune",
                title: "Pune",
                region: "Maharashtra",
                description: "Urban growth and environmental impact monitoring.",
                tags: ["Urban", "10y", "Wards"]
            },
            {
                id: "shahdara-1y",
                title: "Shahdara (1-Year Pilot)",
                region: "Delhi",
                description: "Fast 1-year pilot demonstration over Shahdara district.",
                tags: ["Urban", "1y", "Pilot"]
            },
            {
                id: "surat",
                title: "Surat",
                region: "Gujarat",
                description: "Environmental monitoring of this rapidly growing coastal city.",
                tags: ["Urban", "10y"]
            }
        ];

        function renderOutputs(filtered = null) {
            const container = document.getElementById("outputsContainer");
            const outputs = filtered || OUTPUTS;
            
            if (outputs.length === 0) {
                container.innerHTML = `
                    <div class="no-results">
                        <div class="no-results-title">No results found</div>
                        <p>Try adjusting your search terms or browse all outputs.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = outputs.map(output => `
                <a href="./${output.id}/" class="output-card">
                    <div class="output-card-badge">${output.region}</div>
                    <h2 class="output-card-title">${output.title}</h2>
                    <p class="output-card-description">${output.description}</p>
                    <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px;">
                        ${output.tags.map(tag => `
                            <span style="font-size: 0.7rem; padding: 4px 8px; background: rgba(19, 212, 255, 0.1); border-radius: 4px; color: var(--muted);">${tag}</span>
                        `).join('')}
                    </div>
                    <div class="output-card-link">Explore</div>
                </a>
            `).join('');
        }

        function normalizeString(str) {
            return str.toLowerCase().trim();
        }

        function filterOutputs(query) {
            const normalized = normalizeString(query);
            
            if (!normalized) {
                renderOutputs();
                document.getElementById("searchInfo").classList.remove("visible");
                return;
            }

            const filtered = OUTPUTS.filter(output => {
                const searchableFields = [
                    output.title,
                    output.region,
                    output.description,
                    ...output.tags
                ].map(normalizeString).join(" ");
                
                return searchableFields.includes(normalized);
            });

            renderOutputs(filtered);
            
            const searchInfo = document.getElementById("searchInfo");
            searchInfo.classList.add("visible");
            searchInfo.textContent = `Found ${filtered.length} result${filtered.length !== 1 ? 's' : ''} for "${query}"`;
        }

        document.addEventListener("DOMContentLoaded", () => {
            renderOutputs();
            
            const searchInput = document.getElementById("searchInput");
            searchInput.addEventListener("input", (e) => {
                filterOutputs(e.target.value);
            });
        });
    </script>
</body>
</html>
