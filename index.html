<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>OlmoEarth Output Library</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="./landing/styles.css" />
    </head>
    <body>
        <div class="shell">
            <header class="hero">
                <div class="hero-copy">
                    <div class="eyebrow">OlmoEarth Change Desk</div>
                    <h1 id="siteTitle">Loading output library...</h1>
                    <p id="siteSubtitle" class="hero-subtitle">
                        Reading the catalog and summarizing generated analysis
                        bundles.
                    </p>
                </div>
                <div class="hero-controls">
                    <label class="control-label" for="search"
                        >Search Outputs</label
                    >
                    <input
                        id="search"
                        class="search-input"
                        type="search"
                        placeholder="Search by district, state, tags, or notes"
                    />
                    <div id="libraryStats" class="stats-grid"></div>
                </div>
            </header>

            <main>
                <section class="section-head">
                    <div>
                        <div class="section-title">Available Outputs</div>
                        <div id="sectionHint" class="section-subtitle">
                            Each card is driven by the catalog JSON plus the
                            run's summary file.
                        </div>
                    </div>
                </section>

                <section id="catalogGrid" class="catalog-grid"></section>
                <div id="emptyState" class="empty-state" hidden>
                    No outputs match the current search.
                </div>
            </main>
        </div>

        <script src="./landing/app.js"></script>
    </body>
</html>
